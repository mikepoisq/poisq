<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Страница не найдена — Poisq</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Manrope, sans-serif; background:#F8FAFC; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.container { text-align:center; max-width:400px; }
.code { font-size:96px; font-weight:800; color:#3B6CF4; line-height:1; margin-bottom:16px; }
.title { font-size:24px; font-weight:700; color:#0F172A; margin-bottom:10px; }
.subtitle { font-size:15px; color:#64748B; line-height:1.6; margin-bottom:32px; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; background:#3B6CF4; color:white; border-radius:14px; font-size:15px; font-weight:700; text-decoration:none; transition:opacity 0.15s; }
.btn:active { opacity:0.8; }
.logo { font-size:28px; font-weight:800; color:#3B6CF4; margin-bottom:32px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">ПоисQ</div>
  <div class="code">404</div>
  <div class="title">Страница не найдена</div>
  <div class="subtitle">Возможно, страница была удалена или вы перешли по неверной ссылке.</div>
  <a href="/" class="btn">← На главную</a>
</div>
</body>
</html>
